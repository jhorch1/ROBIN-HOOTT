services:
  backend:
    build: ./backend
    container_name: robinhoot-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5001
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - robinhoot-net

  frontend:
    build: ./frontend
    container_name: robinhoot-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:5001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - robinhoot-net

  mongo:
    image: mongo:7
    container_name: robinhoot-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - robinhoot-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  robinhoot-net:
    driver: bridge
